<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaybeYou Quiz - 後台管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans TC',sans-serif;background:#f5f0f8;color:#333;padding:20px}
  .container{max-width:1100px;margin:0 auto}

  /* Login */
  .login-wrap{
    display:flex;justify-content:center;align-items:center;min-height:80vh;
  }
  .login-card{
    background:white;padding:48px 40px;border-radius:24px;
    box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center;max-width:380px;width:100%;
  }
  .login-card h2{font-size:22px;margin-bottom:8px;color:#333}
  .login-card p{font-size:14px;color:#999;margin-bottom:28px}
  .login-card input{
    display:block;width:100%;padding:14px 20px;border:2px solid #eee;border-radius:14px;
    font-size:16px;font-family:inherit;margin-bottom:16px;text-align:center;
  }
  .login-card input:focus{outline:none;border-color:#c06cd4}
  .login-card button{
    background:linear-gradient(135deg,#e8789a,#c06cd4);color:white;border:none;
    padding:14px 40px;font-size:16px;font-weight:600;border-radius:50px;
    cursor:pointer;font-family:inherit;transition:all .3s;
  }
  .login-card button:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(192,108,212,.4)}
  .login-error{color:#e74c3c;font-size:14px;margin-top:12px;display:none}

  /* Dashboard */
  .dashboard{display:none}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px}
  .header h1{
    font-size:28px;
    background:linear-gradient(135deg,#e8789a,#c06cd4);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .header-right{display:flex;gap:12px;align-items:center}
  .btn-refresh{
    background:#f5f0f8;color:#7b2d8e;border:none;padding:10px 20px;
    border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .2s;
  }
  .btn-refresh:hover{background:#ece4f2}
  .btn-export{
    background:linear-gradient(135deg,#e8789a,#c06cd4);color:white;border:none;
    padding:10px 24px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;
  }

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
  .stat-card{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
  .stat-card .label{font-size:13px;color:#999;margin-bottom:8px}
  .stat-card .value{font-size:36px;font-weight:700;color:#7b2d8e}

  /* Charts */
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
  @media(max-width:768px){.chart-row{grid-template-columns:1fr}}
  .chart-card{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
  .chart-card h3{font-size:16px;margin-bottom:20px;color:#555}

  .bar-chart{display:flex;flex-direction:column;gap:10px}
  .bar-row{display:flex;align-items:center;gap:12px}
  .bar-label{width:100px;font-size:13px;color:#666;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:24px;background:#f5f0f8;border-radius:12px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,#e8789a,#c06cd4);border-radius:12px;transition:width .6s;min-width:2px}
  .bar-count{width:40px;font-size:13px;font-weight:600;color:#7b2d8e}

  /* Table */
  .table-card{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.05);overflow-x:auto}
  .table-card h3{font-size:16px;margin-bottom:16px;color:#555}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#f5f0f8;padding:10px 12px;text-align:left;font-weight:600;color:#666;position:sticky;top:0}
  td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
  tr:hover td{background:#fdf8ff}
  .badge{
    display:inline-block;padding:3px 10px;border-radius:10px;
    font-size:12px;font-weight:600;background:#f3e5f5;color:#7b2d8e;
  }

  .loading-msg{text-align:center;padding:40px;color:#aaa;font-size:15px}
  .empty-msg{text-align:center;padding:40px;color:#ccc;font-size:15px}

  /* Back link */
  .back-link{
    display:inline-flex;align-items:center;gap:6px;
    color:#999;font-size:14px;text-decoration:none;margin-bottom:20px;
  }
  .back-link:hover{color:#7b2d8e}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <svg width="48" height="48" viewBox="0 0 100 100" style="margin-bottom:16px">
      <path d="M50 10 L54 10 L56 2 L60 2 L62 10 L66 12 L72 6 L76 8 L74 16 L78 20 L86 18 L88 22 L80 26 L82 32 L90 34 L90 38 L82 40 L82 46 L90 50 L88 54 L80 52 L78 58 L84 64 L80 68 L74 62 L68 66 L72 74 L68 76 L62 70 L58 72 L58 80 L54 80 L52 72 L46 72 L44 80 L40 80 L40 72 L34 70 L30 76 L26 74 L30 66 L24 62 L18 68 L16 64 L22 58 L18 52 L10 54 L10 50 L18 46 L18 40 L10 38 L10 34 L18 32 L20 26 L12 22 L14 18 L22 20 L26 16 L24 8 L28 6 L34 12 L38 10 L38 2 L42 2 L44 10Z" fill="#c06cd4" opacity=".9"/>
      <circle cx="50" cy="50" r="18" fill="white"/><circle cx="50" cy="50" r="12" fill="#f3e5f5"/>
    </svg>
    <h2>後台管理登入</h2>
    <p>輸入管理密碼查看問卷結果</p>
    <input type="password" id="pw-input" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">登入</button>
    <p class="login-error" id="login-error">密碼錯誤，請重試</p>
  </div>
</div>

<!-- Dashboard -->
<div class="container dashboard" id="dashboard">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    回到問卷
  </a>

  <div class="header">
    <div>
      <h1>MaybeYou Quiz Dashboard</h1>
      <p style="color:#999;font-size:14px">問卷數據管理後台</p>
    </div>
    <div class="header-right">
      <button class="btn-refresh" onclick="loadData()">重新整理</button>
      <button class="btn-export" onclick="exportCSV()">匯出 CSV</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="label">總填寫數</div><div class="value" id="s-total">-</div></div>
    <div class="stat-card"><div class="label">今日填寫</div><div class="value" id="s-today">-</div></div>
    <div class="stat-card"><div class="label">近 7 日</div><div class="value" id="s-week">-</div></div>
    <div class="stat-card"><div class="label">最熱門結果</div><div class="value" id="s-top" style="font-size:18px">-</div></div>
  </div>

  <div class="chart-row">
    <div class="chart-card">
      <h3>推薦結果分佈</h3>
      <div class="bar-chart" id="c-results"><div class="loading-msg">載入中...</div></div>
    </div>
    <div class="chart-card">
      <h3>健康目標分佈</h3>
      <div class="bar-chart" id="c-goals"><div class="loading-msg">載入中...</div></div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-card">
      <h3>性別分佈</h3>
      <div class="bar-chart" id="c-gender"><div class="loading-msg">載入中...</div></div>
    </div>
    <div class="chart-card">
      <h3>年齡層分佈</h3>
      <div class="bar-chart" id="c-age"><div class="loading-msg">載入中...</div></div>
    </div>
  </div>

  <div class="table-card">
    <h3>填寫紀錄</h3>
    <table>
      <thead>
        <tr><th>#</th><th>時間</th><th>性別</th><th>年齡</th><th>目標</th><th>飲食</th><th>腸胃</th><th>睡眠</th><th>肌膚</th><th>運動</th><th>推薦結果</th></tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="11" class="loading-msg">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
var GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbwKsQhA7jvF1CrrazwsEb_wo2uYVyqmzt_RC4dUah2dSPz2xq4TOl0SUPCgxT_KMAUN/exec';
var ADMIN_PASS = 'maybeyou2026';
var allData = null;

function doLogin(){
  var pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PASS){
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

async function loadData(){
  try {
    var res = await fetch(GOOGLE_SHEET_URL);
    var data = await res.json();
    allData = data;
    renderStats(data);
    renderCharts(data);
    renderTable(data.rows);
  } catch(err){
    console.error(err);
    document.getElementById('s-total').textContent = 'Error';
  }
}

function renderStats(d){
  document.getElementById('s-total').textContent = d.total || 0;
  document.getElementById('s-today').textContent = d.today || 0;
  document.getElementById('s-week').textContent = d.this_week || 0;

  var top = '-';
  var topCount = 0;
  if(d.resultCount){
    for(var k in d.resultCount){
      if(d.resultCount[k] > topCount){ topCount = d.resultCount[k]; top = k; }
    }
  }
  document.getElementById('s-top').textContent = top;
}

function renderCharts(d){
  renderBar('c-results', objToArr(d.resultCount));
  renderBar('c-goals', objToArr(d.goalCount));
  renderBar('c-gender', objToArr(d.genderCount));
  renderBar('c-age', objToArr(d.ageCount));
}

function objToArr(obj){
  if(!obj) return [];
  return Object.keys(obj).map(function(k){ return {label:k, count:obj[k]}; })
    .sort(function(a,b){ return b.count - a.count; });
}

function renderBar(id, items){
  var el = document.getElementById(id);
  if(!items.length){ el.innerHTML='<div class="empty-msg">尚無資料</div>'; return; }
  var max = Math.max.apply(null, items.map(function(i){return i.count}));
  el.innerHTML = items.map(function(item){
    var pct = max > 0 ? (item.count/max*100) : 0;
    return '<div class="bar-row">'+
      '<span class="bar-label" title="'+item.label+'">'+item.label+'</span>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
      '<span class="bar-count">'+item.count+'</span></div>';
  }).join('');
}

function renderTable(rows){
  var tbody = document.getElementById('table-body');
  if(!rows || !rows.length){ tbody.innerHTML='<tr><td colspan="11" class="empty-msg">尚無資料</td></tr>'; return; }
  tbody.innerHTML = rows.map(function(r,i){
    return '<tr>'+
      '<td>'+(i+1)+'</td>'+
      '<td>'+(r['時間']||'')+'</td>'+
      '<td>'+(r['性別']||'')+'</td>'+
      '<td>'+(r['年齡']||'')+'</td>'+
      '<td>'+(r['目標']||'')+'</td>'+
      '<td>'+(r['飲食']||'')+'</td>'+
      '<td>'+(r['腸胃']||'')+'</td>'+
      '<td>'+(r['睡眠']||'')+'</td>'+
      '<td>'+(r['肌膚']||'')+'</td>'+
      '<td>'+(r['運動']||'')+'</td>'+
      '<td><span class="badge">'+(r['結果代碼']||'')+' '+(r['結果名稱']||'')+'</span></td></tr>';
  }).join('');
}

function exportCSV(){
  if(!allData || !allData.rows || !allData.rows.length){ alert('沒有資料可匯出'); return; }
  var headers = ['時間','性別','年齡','目標','飲食','腸胃','睡眠','肌膚','運動','結果代碼','結果名稱'];
  var csv = '\uFEFF' + headers.join(',') + '\n';
  allData.rows.forEach(function(r){
    csv += headers.map(function(h){ return '"'+String(r[h]||'').replace(/"/g,'""')+'"'; }).join(',') + '\n';
  });
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'quiz_results_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
