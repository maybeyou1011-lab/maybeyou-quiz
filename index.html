<head>

<title>MaybeYou 每日營養搭配測驗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    font-family:'Noto Sans TC',sans-serif;
    background:linear-gradient(135deg,#fdf6f0 0%,#fce4ec 50%,#f3e5f5 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
  }

  .quiz-container{max-width:480px;width:100%;margin:20px auto}

  /* ─── Landing ─── */
  .landing{
    text-align:center;
    background:white;
    border-radius:24px;
    padding:40px 32px 48px;
    box-shadow:0 8px 40px rgba(0,0,0,.08);
  }

  /* ─── Gears ─── */
  .gear-section{
    position:relative;
    width:200px;height:160px;
    margin:0 auto 24px;
  }
  .gear{position:absolute;border-radius:50%}
  .gear-svg{width:100%;height:100%}

  .gear-lg{width:100px;height:100px;top:10px;left:16px;animation:spinCW 6s linear infinite}
  .gear-md{width:70px;height:70px;top:50px;right:20px;animation:spinCCW 4.2s linear infinite}
  .gear-sm{width:50px;height:50px;top:0;right:40px;animation:spinCW 3s linear infinite}

  @keyframes spinCW{to{transform:rotate(360deg)}}
  @keyframes spinCCW{to{transform:rotate(-360deg)}}

  .landing:hover .gear-lg{animation-duration:2s}
  .landing:hover .gear-md{animation-duration:1.4s}
  .landing:hover .gear-sm{animation-duration:1s}

  .gear-label{
    position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    font-size:12px;color:#bbb;white-space:nowrap;letter-spacing:2px;
  }

  .landing h1{font-size:26px;font-weight:700;color:#333;margin-bottom:8px}
  .landing .subtitle{font-size:15px;color:#888;margin-bottom:28px;line-height:1.6}
  .tag-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:32px}
  .tag{background:#fef0f5;color:#d4618c;font-size:13px;padding:6px 14px;border-radius:20px;font-weight:500}

  .btn-start{
    background:linear-gradient(135deg,#e8789a,#c06cd4);
    color:white;border:none;padding:16px 48px;font-size:18px;font-weight:600;
    border-radius:50px;cursor:pointer;transition:all .3s;font-family:inherit;letter-spacing:1px;
  }
  .btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(192,108,212,.4)}
  .landing .note{margin-top:20px;font-size:13px;color:#aaa}

  /* ─── Progress ─── */
  .progress-wrapper{margin-bottom:20px}
  .progress-bar-bg{height:6px;background:#e8e0f0;border-radius:3px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,#e8789a,#c06cd4);border-radius:3px;transition:width .4s ease}
  .progress-text{text-align:right;font-size:13px;color:#999;margin-top:6px}

  /* ─── Question ─── */
  .question-card{
    background:white;border-radius:24px;padding:36px 28px 28px;
    box-shadow:0 8px 40px rgba(0,0,0,.08);animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .q-number{
    display:inline-block;background:linear-gradient(135deg,#e8789a,#c06cd4);
    color:white;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:16px;
  }
  .q-title{font-size:20px;font-weight:700;color:#333;margin-bottom:24px;line-height:1.5}
  .options{display:flex;flex-direction:column;gap:12px}

  .option-btn{
    display:flex;align-items:center;gap:14px;
    background:#fafafa;border:2px solid #eee;border-radius:16px;padding:16px 20px;
    font-size:15px;color:#444;cursor:pointer;transition:all .25s;
    text-align:left;font-family:inherit;line-height:1.5;
  }
  .option-btn:hover{border-color:#d4a0e8;background:#fdf5ff}
  .option-btn.selected{
    border-color:#c06cd4;
    background:linear-gradient(135deg,#fdf5ff,#fef0f5);
    color:#7b2d8e;font-weight:500;
  }
  .option-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center}

  .nav-row{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
  .btn-back{
    flex:1;background:#f5f0f8;color:#999;border:none;padding:14px;
    font-size:15px;font-weight:500;border-radius:14px;cursor:pointer;font-family:inherit;transition:all .2s;
  }
  .btn-back:hover{background:#ece4f2;color:#666}
  .btn-next{
    flex:2;background:linear-gradient(135deg,#e8789a,#c06cd4);
    color:white;border:none;padding:14px;font-size:16px;font-weight:600;
    border-radius:14px;cursor:pointer;font-family:inherit;transition:all .3s;
    opacity:.4;pointer-events:none;
  }
  .btn-next.active{opacity:1;pointer-events:auto}
  .btn-next.active:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(192,108,212,.3)}

  /* ─── Loading ─── */
  .loading-card{
    background:white;border-radius:24px;padding:60px 32px;
    box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center;animation:fadeIn .4s ease;
  }
  .loading-gears{position:relative;width:160px;height:130px;margin:0 auto 32px}
  .loading-gears .gear-lg{animation-duration:.8s;top:8px;left:8px}
  .loading-gears .gear-md{animation-duration:.56s;top:40px;right:12px}
  .loading-gears .gear-sm{animation-duration:.4s;top:-2px;right:30px}
  .loading-text{font-size:18px;font-weight:600;color:#7b2d8e;margin-bottom:8px}
  .loading-sub{font-size:14px;color:#aaa}
  .loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
  @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

  /* ─── Result ─── */
  .result-card{
    background:white;border-radius:24px;padding:40px 28px;
    box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center;animation:fadeIn .5s ease;
  }
  .result-badge{
    display:inline-block;background:linear-gradient(135deg,#e8789a,#c06cd4);
    color:white;font-size:14px;font-weight:600;padding:6px 20px;border-radius:20px;margin-bottom:20px;
  }
  .result-title{font-size:28px;font-weight:700;color:#333;margin-bottom:8px}
  .result-code{font-size:15px;color:#aaa;margin-bottom:28px}
  .result-desc{
    font-size:15px;color:#666;line-height:1.8;margin-bottom:28px;text-align:left;
    background:#fdf8ff;padding:20px;border-radius:16px;border-left:4px solid #c06cd4;
  }

  .combo-section{margin-bottom:28px}
  .combo-label{font-size:14px;color:#999;margin-bottom:12px;font-weight:500}
  .combo-pills{display:flex;justify-content:center;flex-wrap:wrap;gap:8px}

  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 16px;border-radius:24px;font-size:14px;font-weight:600;color:white;
  }
  .pill-red{background:#e74c3c}.pill-orange{background:#f39c12}
  .pill-yellow{background:#f1c40f;color:#333}.pill-green{background:#27ae60}
  .pill-blue{background:#3498db}.pill-indigo{background:#6c5ce7}
  .pill-purple{background:#8e44ad}.pill-coffee{background:#795548}
  .pill-rice{background:#7e57c2}.pill-cocoa{background:#5d4037}

  .pill .pill-count{
    background:rgba(255,255,255,.3);width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12px;
  }

  .suitable-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:28px}
  .suitable-tag{background:#fef0f5;color:#d4618c;padding:6px 14px;border-radius:20px;font-size:13px}

  .btn-restart{
    background:#f5f0f8;color:#7b2d8e;border:none;padding:14px 40px;
    font-size:15px;font-weight:600;border-radius:50px;cursor:pointer;font-family:inherit;
    transition:all .3s;margin-top:8px;
  }
  .btn-restart:hover{background:#ece4f2}

  .btn-cta{
    background:linear-gradient(135deg,#e8789a,#c06cd4);
    color:white;border:none;padding:16px 40px;font-size:16px;font-weight:600;
    border-radius:50px;cursor:pointer;font-family:inherit;transition:all .3s;
    margin-bottom:12px;display:inline-block;
  }
  .btn-cta:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(192,108,212,.4)}

  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
    background:#e74c3c;color:white;padding:14px 28px;border-radius:12px;
    font-size:14px;transition:transform .3s ease;z-index:999;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  .hidden{display:none!important}
</style>
</head>

var currentQ = 0;
var answers = {};

function startQuiz(){
  document.getElementById('page-landing').classList.add('hidden');
  document.getElementById('page-quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion(){
  var q = questions[currentQ];
  var total = questions.length;
  document.getElementById('progress-fill').style.width = (currentQ/total*100)+'%';
  document.getElementById('progress-text').textContent = (currentQ+1)+' / '+total;

  var card = document.getElementById('question-card');
  var sel = answers[q.id]||null;

  var opts = q.options.map(function(o){
    return '<button class="option-btn '+(sel===o.value?'selected':'')+'" data-qid="'+q.id+'" data-val="'+o.value+'">'+
      '<span class="option-icon">'+o.icon+'</span><span>'+o.text+'</span></button>';
  }).join('');

  card.innerHTML =
    '<span class="q-number">Q'+(currentQ+1)+'</span>'+
    '<h2 class="q-title">'+q.title+'</h2>'+
    '<div class="options">'+opts+'</div>'+
    '<div class="nav-row">'+
      '<button class="btn-back '+(currentQ===0?'hidden':'')+'" id="btn-back">上一題</button>'+
      '<button class="btn-next '+(sel?'active':'')+'" id="btn-next">'+(currentQ===total-1?'查看結果':'下一題')+'</button>'+
    '</div>';

  card.querySelectorAll('.option-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      answers[this.dataset.qid]=this.dataset.val;
      card.querySelectorAll('.option-btn').forEach(function(b){b.classList.remove('selected')});
      this.classList.add('selected');
      document.getElementById('btn-next').classList.add('active');
    });
  });
  document.getElementById('btn-next').addEventListener('click',nextQuestion);
  var bb=document.getElementById('btn-back');
  if(bb)bb.addEventListener('click',function(){if(currentQ>0){currentQ--;renderQuestion()}});

  card.style.animation='none';card.offsetHeight;card.style.animation='fadeIn .4s ease';
}

function nextQuestion(){
  if(!answers[questions[currentQ].id])return;
  if(currentQ<questions.length-1){currentQ++;renderQuestion()}
  else{submitQuiz()}
}

function calculateResult(){
  var g=answers.gender,a=answers.age,go=answers.goal,d=answers.diet,gu=answers.gut,s=answers.sleep,sk=answers.skin,e=answers.exercise;
  if(a==='teen')return(e==='none'||e==='light')?'D11':'D12';
  if(a==='senior')return'D13';
  if(g==='female'&&sk==='intimate')return'D14';
  if(g==='male'){
    if(go==='immunity'||(go==='energy'&&(e==='regular'||e==='intense')))return'D10';
    if(go==='slim')return'D2';
    if(go==='digest')return'D1';
    return'D9';
  }
  if(go==='slim')return d==='carbs'?'D2':'D4';
  if(go==='digest')return gu==='normal'?'D4':'D1';
  if(go==='beauty'){
    if(sk==='dull'||sk==='unstable')return(d==='balanced'||e==='regular'||e==='intense')?'D8':'D6';
    return'D5';
  }
  if(go==='sleep')return sk==='dull'?'D5':'D7';
  if(go==='energy')return s==='tired'?'D3':'D5';
  if(go==='immunity'){
    if(e==='regular'||e==='intense')return'D3';
    if(gu!=='normal')return'D4';
    return'D7';
  }
  return'D7';
}

function submitQuiz(){
  document.getElementById('page-quiz').classList.add('hidden');
  document.getElementById('page-loading').classList.remove('hidden');

  var code=calculateResult();
  var r=results[code];

  // Send to Google Sheets
  var payload={
    gender:answers.gender,age:answers.age,goal:answers.goal,diet:answers.diet,
    gut:answers.gut,sleep:answers.sleep,skin:answers.skin,exercise:answers.exercise,
    result_code:r.code,result_name:r.name
  };

  if(GOOGLE_SHEET_URL && GOOGLE_SHEET_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'){
    fetch(GOOGLE_SHEET_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    }).catch(function(){});
  }

  // Show result after 1.5s
  setTimeout(function(){ showResult(r); },1500);
}

function showResult(r){
  document.getElementById('page-loading').classList.add('hidden');
  var page=document.getElementById('page-result');
  page.classList.remove('hidden');

  var pillsHtml=r.pills.map(function(p){
    return'<span class="pill pill-'+p.c+'"><span>'+p.n+'</span><span class="pill-count">'+p.q+'</span></span>';
  }).join('');
  var tagsHtml=r.tags.map(function(t){return'<span class="suitable-tag">#'+t+'</span>'}).join('');

  page.innerHTML=
    '<div class="result-card">'+
      '<span class="result-badge">你的專屬推薦</span>'+
      '<h2 class="result-title">'+r.name+'</h2>'+
      '<p class="result-code">'+r.code+' ｜ 每日組合：'+r.combo+'</p>'+
      '<div class="combo-section"><p class="combo-label">每日搭配內容</p><div class="combo-pills">'+pillsHtml+'</div></div>'+
      '<div class="result-desc">'+r.desc+'</div>'+
      '<div class="suitable-tags">'+tagsHtml+'</div>'+
      '<button class="btn-cta" id="btn-cta">立即選購組合</button><br>'+
      '<button class="btn-restart" id="btn-restart">重新測驗</button>'+
    '</div>';

  document.getElementById('btn-cta').addEventListener('click',function(){alert('即將為您導向商品頁面！')});
  document.getElementById('btn-restart').addEventListener('click',function(){
    currentQ=0;answers={};
    page.classList.add('hidden');
    document.getElementById('page-landing').classList.remove('hidden');
  });
}
