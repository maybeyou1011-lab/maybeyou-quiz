<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaybeYou 每日營養搭配測驗</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans TC',sans-serif;
    background:#f8f6f3;
    min-height:100vh;
  }

  .quiz-container{max-width:480px;width:100%;margin:0 auto;min-height:100vh}

  /* ═══════════════════════════════════════
     LANDING
     ═══════════════════════════════════════ */
  .landing{min-height:100vh;display:flex;flex-direction:column}

  /* Hero Image Slider */
  .hero-slider{
    position:relative;width:100%;height:320px;overflow:hidden;
  }
  .hero-slide{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background-size:cover;background-position:center;
    opacity:0;transition:opacity 1.2s ease;
  }
  .hero-slide.active{opacity:1}
  .hero-slide::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:120px;
    background:linear-gradient(transparent,#f8f6f3);
  }

  /* Dots */
  .hero-dots{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    display:flex;gap:8px;z-index:2;
  }
  .hero-dot{
    width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);
    transition:all .3s;
  }
  .hero-dot.active{background:white;width:24px;border-radius:4px}

  /* Content */
  .landing-content{
    flex:1;padding:32px 28px 40px;text-align:center;
    background:#f8f6f3;
  }
  .brand-tag{
    display:inline-block;font-size:12px;letter-spacing:3px;color:#b8956a;
    text-transform:uppercase;margin-bottom:16px;font-weight:500;
  }
  .landing-content h1{
    font-size:28px;font-weight:700;color:#2c2c2c;margin-bottom:12px;
    line-height:1.4;
  }
  .landing-content .subtitle{
    font-size:15px;color:#999;margin-bottom:32px;line-height:1.7;
  }

  .tag-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:36px}
  .tag{
    background:white;color:#b8956a;font-size:12px;padding:8px 16px;
    border-radius:24px;font-weight:500;border:1px solid #efe8de;
    letter-spacing:.5px;
  }

  .btn-start{
    background:#2c2c2c;color:white;border:none;
    padding:18px 56px;font-size:17px;font-weight:600;
    border-radius:50px;cursor:pointer;transition:all .3s;
    font-family:inherit;letter-spacing:2px;
  }
  .btn-start:hover{background:#444;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
  .landing-content .note{margin-top:20px;font-size:12px;color:#ccc;letter-spacing:1px}

  /* ═══════════════════════════════════════
     PROGRESS
     ═══════════════════════════════════════ */
  .progress-wrapper{padding:20px 20px 0}
  .progress-bar-bg{height:4px;background:#e8e4de;border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:#b8956a;border-radius:2px;transition:width .4s ease}
  .progress-text{text-align:right;font-size:12px;color:#bbb;margin-top:8px;letter-spacing:1px}

  /* ═══════════════════════════════════════
     QUESTION CARD
     ═══════════════════════════════════════ */
  .question-card{
    background:white;border-radius:24px;padding:36px 24px 28px;
    margin:16px 20px;box-shadow:0 4px 20px rgba(0,0,0,.04);
    animation:fadeIn .4s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  .q-number{
    display:inline-block;background:#2c2c2c;color:white;
    font-size:11px;font-weight:700;padding:4px 14px;
    border-radius:20px;margin-bottom:16px;letter-spacing:1px;
  }
  .q-title{font-size:20px;font-weight:700;color:#2c2c2c;margin-bottom:24px;line-height:1.5}
  .options{display:flex;flex-direction:column;gap:10px}

  .option-btn{
    display:flex;align-items:center;gap:14px;
    background:#fafaf8;border:2px solid #f0ece6;border-radius:16px;
    padding:15px 18px;font-size:15px;color:#555;cursor:pointer;
    transition:all .25s;text-align:left;font-family:inherit;line-height:1.5;
  }
  .option-btn:hover{border-color:#d4c5a9;background:#fdfcf9}
  .option-btn.selected{
    border-color:#b8956a;background:#fdfaf5;color:#6b5a3e;font-weight:500;
  }
  .option-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}

  .nav-row{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
  .btn-back{
    flex:1;background:#f5f3ef;color:#aaa;border:none;padding:14px;
    font-size:15px;font-weight:500;border-radius:14px;cursor:pointer;
    font-family:inherit;transition:all .2s;
  }
  .btn-back:hover{background:#ece8e0;color:#888}
  .btn-next{
    flex:2;background:#2c2c2c;color:white;border:none;padding:14px;
    font-size:16px;font-weight:600;border-radius:14px;cursor:pointer;
    font-family:inherit;transition:all .3s;opacity:.3;pointer-events:none;
    letter-spacing:1px;
  }
  .btn-next.active{opacity:1;pointer-events:auto}
  .btn-next.active:hover{background:#444;transform:translateY(-1px)}

  /* ═══════════════════════════════════════
     LOADING
     ═══════════════════════════════════════ */
  .loading-card{
    background:white;border-radius:24px;padding:60px 32px;margin:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.04);text-align:center;animation:fadeIn .4s ease;
  }
  .loading-spinner{
    width:60px;height:60px;border:4px solid #f0ece6;border-top-color:#b8956a;
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 28px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:18px;font-weight:600;color:#2c2c2c;margin-bottom:8px}
  .loading-sub{font-size:14px;color:#bbb}

  /* ═══════════════════════════════════════
     RESULT
     ═══════════════════════════════════════ */
  .result-card{
    background:white;border-radius:24px;padding:40px 24px;margin:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.04);text-align:center;animation:fadeIn .5s ease;
  }
  .result-badge{
    display:inline-block;background:#2c2c2c;color:white;
    font-size:12px;font-weight:600;padding:6px 20px;
    border-radius:20px;margin-bottom:20px;letter-spacing:2px;
  }
  .result-title{font-size:28px;font-weight:700;color:#2c2c2c;margin-bottom:8px}
  .result-code{font-size:14px;color:#bbb;margin-bottom:28px;letter-spacing:1px}
  .result-desc{
    font-size:15px;color:#666;line-height:1.8;margin-bottom:28px;text-align:left;
    background:#fdfaf5;padding:20px;border-radius:16px;border-left:4px solid #b8956a;
  }

  .combo-section{margin-bottom:28px}
  .combo-label{font-size:13px;color:#bbb;margin-bottom:12px;font-weight:500;letter-spacing:1px}
  .combo-pills{display:flex;justify-content:center;flex-wrap:wrap;gap:8px}

  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 16px;border-radius:24px;font-size:13px;font-weight:600;color:white;
  }
  .pill-red{background:#e05252}.pill-orange{background:#e8a040}
  .pill-yellow{background:#e8d040;color:#555}.pill-green{background:#4caf7a}
  .pill-blue{background:#4a90d9}.pill-indigo{background:#7c6dd8}
  .pill-purple{background:#9c5bb5}.pill-coffee{background:#8d6e55}
  .pill-rice{background:#8b6fc0}.pill-cocoa{background:#6d5243}

  .pill .pill-count{
    background:rgba(255,255,255,.25);width:20px;height:20px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:11px;
  }

  .suitable-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:28px}
  .suitable-tag{background:#fdfaf5;color:#b8956a;padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid #efe8de}

  .btn-restart{
    background:#f5f3ef;color:#888;border:none;padding:14px 40px;
    font-size:14px;font-weight:600;border-radius:50px;cursor:pointer;
    font-family:inherit;transition:all .3s;margin-top:8px;
  }
  .btn-restart:hover{background:#ece8e0}
  .btn-cta{
    background:#2c2c2c;color:white;border:none;padding:16px 44px;
    font-size:16px;font-weight:600;border-radius:50px;cursor:pointer;
    font-family:inherit;transition:all .3s;margin-bottom:12px;display:inline-block;
    letter-spacing:1px;
  }
  .btn-cta:hover{background:#444;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}

  /* Result product image */
  .result-img{
    width:100%;border-radius:16px;margin-bottom:24px;
  }

  /* Admin Gear */
  .admin-gear{
    position:fixed;bottom:20px;right:20px;width:40px;height:40px;
    background:rgba(255,255,255,.9);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;
    transition:all .3s;text-decoration:none;z-index:100;
    border:1px solid #efe8de;
  }
  .admin-gear:hover{transform:rotate(90deg);box-shadow:0 4px 20px rgba(0,0,0,.12)}
  .admin-gear svg{width:20px;height:20px}

  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
    background:#e05252;color:white;padding:14px 28px;border-radius:12px;
    font-size:14px;transition:transform .3s ease;z-index:999;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  .hidden{display:none!important}
</style>
</head>

var currentQ=0, answers={};

function startQuiz(){
  document.getElementById('page-landing').classList.add('hidden');
  document.getElementById('page-quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion(){
  var q=questions[currentQ],total=questions.length;
  document.getElementById('progress-fill').style.width=(currentQ/total*100)+'%';
  document.getElementById('progress-text').textContent=(currentQ+1)+' / '+total;
  var card=document.getElementById('question-card'),sel=answers[q.id]||null;
  var opts=q.options.map(function(o){
    return '<button class="option-btn '+(sel===o.value?'selected':'')+'" data-qid="'+q.id+'" data-val="'+o.value+'">'+
      '<span class="option-icon">'+o.icon+'</span><span>'+o.text+'</span></button>';
  }).join('');
  card.innerHTML='<span class="q-number">Q'+(currentQ+1)+'</span>'+
    '<h2 class="q-title">'+q.title+'</h2><div class="options">'+opts+'</div>'+
    '<div class="nav-row"><button class="btn-back '+(currentQ===0?'hidden':'')+'" id="btn-back">上一題</button>'+
    '<button class="btn-next '+(sel?'active':'')+'" id="btn-next">'+(currentQ===total-1?'查看結果':'下一題')+'</button></div>';
  card.querySelectorAll('.option-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      answers[this.dataset.qid]=this.dataset.val;
      card.querySelectorAll('.option-btn').forEach(function(b){b.classList.remove('selected')});
      this.classList.add('selected');
      document.getElementById('btn-next').classList.add('active');
    });
  });
  document.getElementById('btn-next').addEventListener('click',nextQuestion);
  var bb=document.getElementById('btn-back');
  if(bb)bb.addEventListener('click',function(){if(currentQ>0){currentQ--;renderQuestion()}});
  card.style.animation='none';card.offsetHeight;card.style.animation='fadeIn .4s ease';
}

function nextQuestion(){
  if(!answers[questions[currentQ].id])return;
  if(currentQ<questions.length-1){currentQ++;renderQuestion()}
  else{submitQuiz()}
}

function calculateResult(){
  var g=answers.gender,a=answers.age,go=answers.goal,d=answers.diet,gu=answers.gut,s=answers.sleep,sk=answers.skin,e=answers.exercise;
  if(a==='teen')return(e==='none'||e==='light')?'D11':'D12';
  if(a==='senior')return'D13';
  if(g==='female'&&sk==='intimate')return'D14';
  if(g==='male'){
    if(go==='immunity'||(go==='energy'&&(e==='regular'||e==='intense')))return'D10';
    if(go==='slim')return'D2';if(go==='digest')return'D1';return'D9';
  }
  if(go==='slim')return d==='carbs'?'D2':'D4';
  if(go==='digest')return gu==='normal'?'D4':'D1';
  if(go==='beauty'){if(sk==='dull'||sk==='unstable')return(d==='balanced'||e==='regular'||e==='intense')?'D8':'D6';return'D5'}
  if(go==='sleep')return sk==='dull'?'D5':'D7';
  if(go==='energy')return s==='tired'?'D3':'D5';
  if(go==='immunity'){if(e==='regular'||e==='intense')return'D3';if(gu!=='normal')return'D4';return'D7'}
  return'D7';
}

function submitQuiz(){
  document.getElementById('page-quiz').classList.add('hidden');
  document.getElementById('page-loading').classList.remove('hidden');
  var code=calculateResult(),r=results[code];
  var payload={gender:answers.gender,age:answers.age,goal:answers.goal,diet:answers.diet,
    gut:answers.gut,sleep:answers.sleep,skin:answers.skin,exercise:answers.exercise,
    result_code:r.code,result_name:r.name};
  if(GOOGLE_SHEET_URL){
    fetch(GOOGLE_SHEET_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),redirect:'follow'}).catch(function(){});
  }
  setTimeout(function(){showResult(r)},1800);
}

function showResult(r){
  document.getElementById('page-loading').classList.add('hidden');
  var page=document.getElementById('page-result');page.classList.remove('hidden');
  var pillsHtml=r.pills.map(function(p){
    return'<span class="pill pill-'+p.c+'"><span>'+p.n+'</span><span class="pill-count">'+p.q+'</span></span>';
  }).join('');
  var tagsHtml=r.tags.map(function(t){return'<span class="suitable-tag">#'+t+'</span>'}).join('');
  page.innerHTML='<div class="result-card">'+
    '<img src="img/hero-products.jpg" class="result-img" alt="MaybeYou Products">'+
    '<span class="result-badge">YOUR DAILY COMBO</span>'+
    '<h2 class="result-title">'+r.name+'</h2>'+
    '<p class="result-code">'+r.code+' ｜ '+r.combo+'</p>'+
    '<div class="combo-section"><p class="combo-label">每日搭配內容</p><div class="combo-pills">'+pillsHtml+'</div></div>'+
    '<div class="result-desc">'+r.desc+'</div>'+
    '<div class="suitable-tags">'+tagsHtml+'</div>'+
    '<button class="btn-cta" id="btn-cta">立即選購組合</button><br>'+
    '<button class="btn-restart" id="btn-restart">重新測驗</button></div>';
  document.getElementById('btn-cta').addEventListener('click',function(){alert('即將為您導向商品頁面！')});
  document.getElementById('btn-restart').addEventListener('click',function(){
    currentQ=0;answers={};page.classList.add('hidden');document.getElementById('page-landing').classList.remove('hidden');
  });
}
</script>
